# Training hyperparameters — all values configurable
# Run: python factory/training/train.py --agent data_manager

epochs: 50
batch_size: 2         # M1 8GB constraint — reduce to 1 if OOM
learning_rate: 3.0e-4
warmup_steps: 100
optimizer: adamw
weight_decay: 0.01
gradient_clipping: 1.0
save_every_n_epochs: 1
mixed_precision: false  # set true if memory is tight (bfloat16 on MPS)
log_every_n_steps: 10
